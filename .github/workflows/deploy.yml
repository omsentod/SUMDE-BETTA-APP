name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Express Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy backend to nodejs/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: sumde-backend/
          server-dir: /domains/sumdebetta.com/nodejs/
          exclude: |
            **/.git*
            **/node_modules/**
            **/dev.db
          dangerous-clean-slate: false

      - name: Install dependencies & restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            cd ~/domains/sumdebetta.com/nodejs
            npm install --omit=dev
            npx prisma generate

  deploy-frontend:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sumde-frontend/package-lock.json

      - name: Install dependencies
        working-directory: sumde-frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: sumde-frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: npm run build

      - name: Deploy frontend to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: sumde-frontend/out/
          server-dir: /domains/sumdebetta.com/public_html/
          dangerous-clean-slate: false
