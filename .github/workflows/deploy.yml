name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sumde-frontend/package-lock.json

      - name: Install & Build
        working-directory: sumde-frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Push build output to deploy-frontend branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: sumde-frontend/out
          publish_branch: deploy-frontend
          force_orphan: true

  deploy:
    name: Deploy to Hostinger via SSH
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          command_timeout: 20m
          script: |
            set -e
            export PATH="/opt/alt/alt-nodejs22/root/usr/bin:$PATH"
            REPO_DIR="$HOME/domains/sumdebetta.com/.repo"
            FRONTEND_DIR="$HOME/domains/sumdebetta.com/.frontend"

            # --- Clone atau pull backend (branch main) ---
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR" && git pull origin main
            else
              git clone "https://${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_REPO }}.git" "$REPO_DIR"
            fi

            # --- Clone atau pull frontend build (branch deploy-frontend) ---
            if [ -d "$FRONTEND_DIR/.git" ]; then
              cd "$FRONTEND_DIR" && git fetch origin deploy-frontend && git reset --hard origin/deploy-frontend
            else
              git clone "https://${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_REPO }}.git" \
                --branch deploy-frontend --single-branch "$FRONTEND_DIR"
            fi

            # --- Sync backend ke nodejs/ ---
            rsync -r --exclude='node_modules' --exclude='dev.db' \
              "$REPO_DIR/sumde-backend/" \
              "$HOME/domains/sumdebetta.com/nodejs/"
            cd "$HOME/domains/sumdebetta.com/nodejs"
            npm install --omit=dev
            npx prisma generate
            DATABASE_URL="${{ secrets.DATABASE_URL }}" npx prisma db push

            # --- Sync frontend build ke public_html/ ---
            rsync -r --delete --exclude='.git' \
              "$FRONTEND_DIR/" \
              "$HOME/domains/sumdebetta.com/public_html/"
