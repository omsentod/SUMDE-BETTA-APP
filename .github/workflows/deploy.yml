name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sumde-frontend/package-lock.json

      - name: Install & Build
        working-directory: sumde-frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Push build output to deploy-frontend branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: sumde-frontend/out
          publish_branch: deploy-frontend
          force_orphan: true

  deploy:
    name: Trigger Deploy on Server
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Trigger webhook deploy
        run: |
          curl -f -X POST https://sumdebetta.com/api/webhook/deploy \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --retry 3 --retry-delay 5
