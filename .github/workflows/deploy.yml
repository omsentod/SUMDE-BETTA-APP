name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Express Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload backend via rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASS }}" rsync -avz --delete \
            --exclude='node_modules' --exclude='dev.db' --exclude='.git' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            sumde-backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/domains/sumdebetta.com/nodejs/

      - name: Install dependencies via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          script: |
            export PATH="/opt/alt/alt-nodejs22/root/usr/bin:$PATH"
            cd ~/domains/sumdebetta.com/nodejs
            npm install --omit=dev
            npx prisma generate

  deploy-frontend:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sumde-frontend/package-lock.json

      - name: Install dependencies
        working-directory: sumde-frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: sumde-frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload frontend via rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASS }}" rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            sumde-frontend/out/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/domains/sumdebetta.com/public_html/
