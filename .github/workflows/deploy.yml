name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          command_timeout: 20m
          script: |
            set -e
            export PATH="/opt/alt/alt-nodejs22/root/usr/bin:$PATH"
            REPO_DIR="$HOME/domains/sumdebetta.com/.repo"

            # Clone or pull latest code from GitHub
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git pull origin main
            else
              git clone "https://${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_REPO }}.git" "$REPO_DIR"
            fi

            # --- Backend ---
            rsync -r --exclude='node_modules' --exclude='dev.db' \
              "$REPO_DIR/sumde-backend/" \
              "$HOME/domains/sumdebetta.com/nodejs/"
            cd "$HOME/domains/sumdebetta.com/nodejs"
            npm install --omit=dev
            npx prisma generate

            # --- Frontend ---
            cd "$REPO_DIR/sumde-frontend"
            npm install
            BACKEND_API_URL=https://sumdebetta.com npm run build
            rsync -r --delete out/ "$HOME/domains/sumdebetta.com/public_html/"
