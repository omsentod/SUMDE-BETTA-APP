name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Express Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare backend files (exclude node_modules & db)
        run: rsync -r --exclude='node_modules' --exclude='dev.db' --exclude='.git' sumde-backend/ backend-deploy/

      - name: Upload backend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          source: "backend-deploy/*"
          target: "/home/${{ secrets.SSH_USER }}/domains/sumdebetta.com/nodejs"
          strip_components: 1

      - name: Install dependencies via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          script: |
            export PATH="/opt/alt/alt-nodejs22/root/usr/bin:$PATH"
            cd ~/domains/sumdebetta.com/nodejs
            npm install --omit=dev
            npx prisma generate

  deploy-frontend:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sumde-frontend/package-lock.json

      - name: Install dependencies
        working-directory: sumde-frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: sumde-frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: npm run build

      - name: Upload frontend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          source: "sumde-frontend/out/*"
          target: "/home/${{ secrets.SSH_USER }}/domains/sumdebetta.com/public_html"
          strip_components: 2
